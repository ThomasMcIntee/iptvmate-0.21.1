<div class="player-host" #playerHost (mousemove)="notifyActivity()" (mouseenter)="notifyActivity()" (mouseleave)="setInactive()" (touchstart)="notifyActivity()">
    <video #videoPlayer id="video-player" autoplay="true" controls="true" disablePictureInPicture></video>
    @if (errorMessage) {
        <div class="player-error" role="alert">
            <div class="player-error__title">Playback error</div>
            <div class="player-error__message">{{ errorMessage }}</div>
            @if (errorHint) {
                <div class="player-error__hint">{{ errorHint }}</div>
            }
        </div>
    }
</div>
